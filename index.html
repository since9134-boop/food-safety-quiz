<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食品衛生互動測驗</title>
<style>
  :root{
    --bg:#0f1b2d; --card:#ffffff; --ink:#1f2d3d; --muted:#6b7a8d;
    --blue:#1f4e79; --blue2:#2e75b6; --green:#1f9d55; --red:#d64545;
    --amber:#e0a800; --line:#e3e8ef; --soft:#f5f8fc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:linear-gradient(160deg,#10243d,#0f1b2d);color:var(--ink);line-height:1.7;padding:24px 14px 60px}
  .wrap{max-width:820px;margin:0 auto}
  header{text-align:center;color:#fff;margin-bottom:22px}
  header h1{font-size:26px;margin:0 0 6px;letter-spacing:1px}
  header p{margin:0;color:#9fb4cc;font-size:14px}
  .card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}
  /* menu */
  .chap-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.chap-grid{grid-template-columns:1fr}}
  .chap{border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;background:var(--soft);position:relative}
  .chap:hover{border-color:var(--blue2);transform:translateY(-2px);box-shadow:0 6px 18px rgba(31,78,121,.15)}
  .chap h3{margin:0 0 6px;color:var(--blue);font-size:17px}
  .chap .meta{font-size:13px;color:var(--muted)}
  .chap .best{margin-top:10px;font-size:13px;color:var(--green);font-weight:700;min-height:18px}
  .modes{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{background:var(--blue2)}
  .btn-ghost{background:#eef3f9;color:var(--blue)}
  .btn-ghost:hover{background:#dfeaf6}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:13px;color:var(--muted);text-align:center;margin-top:14px}
  /* quiz */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .topbar .title{font-weight:800;color:var(--blue);font-size:16px}
  .progresswrap{background:#e9eef5;border-radius:10px;height:9px;overflow:hidden;margin:10px 0 4px}
  .progress{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));width:0;transition:.3s}
  .counts{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:14px}
  .qnum{display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:2px 10px;font-size:13px;margin-bottom:10px;font-weight:700}
  .qtext{font-size:18px;font-weight:700;margin:0 0 16px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:.12s;background:#fff}
  .opt:hover{border-color:var(--blue2);background:var(--soft)}
  .opt .key{flex:0 0 26px;height:26px;border-radius:50%;background:#eef3f9;color:var(--blue);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
  .opt .txt{flex:1}
  .opt.correct{border-color:var(--green);background:#eafaf0}
  .opt.correct .key{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:#fdeeee}
  .opt.wrong .key{background:var(--red);color:#fff}
  .opt.disabled{cursor:default;pointer-events:none}
  .explain{border-left:4px solid var(--amber);background:#fff8e6;border-radius:8px;padding:12px 14px;margin:6px 0 4px;font-size:15px;display:none}
  .explain.show{display:block;animation:fade .25s}
  .explain b{color:#9a7600}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  .badge{font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px}
  .badge.ok{background:#eafaf0;color:var(--green)}
  .badge.no{background:#fdeeee;color:var(--red)}
  /* result */
  .scorebig{font-size:54px;font-weight:900;color:var(--blue);text-align:center;margin:6px 0}
  .scoresub{text-align:center;color:var(--muted);margin-bottom:18px}
  .ring{display:block;margin:0 auto 10px}
  .review h4{color:var(--blue);margin:18px 0 8px;border-bottom:2px solid var(--line);padding-bottom:6px}
  .ritem{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:14px}
  .ritem .q{font-weight:700;margin-bottom:6px}
  .ritem .a{color:var(--green)}
  .ritem .y{color:var(--red)}
  .ritem .e{color:var(--muted);margin-top:6px}
  .tag{font-size:12px;padding:2px 8px;border-radius:6px;margin-right:6px}
  .tag.ok{background:#eafaf0;color:var(--green)}
  .tag.no{background:#fdeeee;color:var(--red)}
  .footer{text-align:center;color:#7e93ac;font-size:12px;margin-top:20px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>食品衛生　互動式測驗</h1>
    <p>第 5、6、7、11 章　·　每章 50 題單選　·　即時批改 · 附詳解</p>
  </header>

  <!-- MENU -->
  <div id="menu">
    <div class="card">
      <div class="chap-grid" id="chapGrid"></div>
      <p class="hint">選擇章節後，可挑「循序測驗」或「隨機抽考」。作答後立即顯示正解與詳解。</p>
      <div style="text-align:center;margin-top:14px">
        <a href="food-safety-notes.docx" download="食品衛生重點整理.docx"
           style="display:inline-block;background:#1f9d55;color:#fff;text-decoration:none;font-weight:700;padding:11px 22px;border-radius:10px;font-size:15px">⬇ 下載重點整理（Word）</a>
        <p class="hint" style="margin-top:8px">四章考前重點與名詞速查，可離線複習。</p>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="card">
      <div class="topbar">
        <span class="title" id="qTitle"></span>
        <button class="btn btn-ghost" id="backBtn">← 返回章節</button>
      </div>
      <div class="progresswrap"><div class="progress" id="prog"></div></div>
      <div class="counts">
        <span id="posTxt"></span>
        <span>✔ <span id="okTxt">0</span>　✘ <span id="noTxt">0</span></span>
      </div>
      <div id="qbody"></div>
      <div class="nav">
        <button class="btn btn-ghost" id="prevBtn">上一題</button>
        <button class="btn btn-primary" id="nextBtn">下一題 →</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">
    <div class="card">
      <svg class="ring" id="ring" width="120" height="120" viewBox="0 0 120 120"></svg>
      <div class="scorebig" id="scoreBig"></div>
      <div class="scoresub" id="scoreSub"></div>
      <div class="modes">
        <button class="btn btn-primary" id="retryWrong">只重做錯題</button>
        <button class="btn btn-ghost" id="retryAll">重新測驗</button>
        <button class="btn btn-ghost" id="toMenu">回章節選單</button>
      </div>
      <div class="review" id="review"></div>
    </div>
  </div>

  <div class="footer">飽福餐飲 · 食品衛生自學測驗　|　資料整理自第 5/6/7/11 章教材</div>
</div>

<script>
// 食品衛生互動測驗題庫 — 四章 × 50 題單選，每題附詳解
// a = 正解索引(0-3)
const QUIZ = {
  ch5: {
    title: "第5章　硝酸鹽、亞硝酸鹽及亞硝基化合物",
    questions: [
      {q:"硝酸鹽(NO₃⁻)本身的毒性為何？", o:["劇毒","本身無毒，但會被還原成亞硝酸鹽","強致癌物","會直接造成腎結石"], a:1, e:"硝酸鹽本身無毒，但在細菌或還原環境下會被還原成亞硝酸鹽(NO₃⁻→NO₂⁻)。"},
      {q:"亞硝酸鹽與胺類結合，在酸性或高溫下會生成下列何者？", o:["維生素C","亞硝胺(亞硝基化合物)","一氧化氮","硝酸鈉"], a:1, e:"亞硝酸鹽+胺類→亞硝胺，具致癌性。"},
      {q:"人體攝取的硝酸鹽超過80%來自下列何者？", o:["加工肉品","蔬菜","飲用水","海鮮"], a:1, e:"逾80%硝酸鹽攝取來自蔬菜(芹菜、菠菜、萵苣最高)，少量來自水。"},
      {q:"亞硝酸鹽在加工肉品中『不』具有下列哪項功能？", o:["抑制肉毒桿菌","保持紅潤肉色","賦予醃漬風味","補充蛋白質"], a:3, e:"亞硝酸鹽用於抑菌、保色、賦味與延緩脂肪酸敗，並非補充蛋白質。"},
      {q:"大量攝入亞硝酸鹽引發的急性危害是？", o:["正鐵血紅蛋白血症","肝硬化","胃潰瘍","骨質疏鬆"], a:0, e:"亞硝酸鹽使Fe²⁺氧化成Fe³⁺(Hb→MetHb)，造成正鐵血紅蛋白血症，阻礙攜氧。"},
      {q:"亞硝酸鹽造成的血紅素變化是？", o:["Fe³⁺還原為Fe²⁺","Fe²⁺氧化為Fe³⁺","完全分解血紅素","使血紅素增生"], a:1, e:"血紅素中Fe²⁺被氧化成Fe³⁺，形成無法攜氧的變性血紅素(MetHb)。"},
      {q:"亞硝基化合物(亞硝胺)被IARC列為？", o:["完全無害物","可能的致癌物質","必需營養素","食品保色劑"], a:1, e:"亞硝胺被世界衛生組織IARC列為可能致癌物，長期大量食用增加胃癌、食道癌風險。"},
      {q:"加工肉品添加硝酸鹽/亞硝酸鹽最主要是為了抑制哪種危險細菌？", o:["大腸桿菌","肉毒桿菌","沙門氏菌","金黃色葡萄球菌"], a:1, e:"低氧/無氧的加工肉品環境易促肉毒桿菌生長並產生神經毒素，添加可抑制之。"},
      {q:"亞硝酸鹽的毒性本質主要是？", o:["細胞癌變","血紅素變性","神經麻痺","骨骼軟化"], a:1, e:"亞硝酸鹽的毒性主要造成血紅素變性，而非細胞癌變。"},
      {q:"下列何種食物與加工肉品同食較易促成亞硝胺生成，應避免？", o:["芭樂","奇異果","魷魚、秋刀魚","深綠色蔬菜"], a:2, e:"魷魚、秋刀魚、干貝、起司、養樂多等高胺類食物應避免與加工肉品同食。"},
      {q:"哪種營養素能有效抑制亞硝胺的合成？", o:["維生素C","鈉","飽和脂肪","膽固醇"], a:0, e:"維生素C(及抗氧化劑)能抑制亞硝胺合成，建議搭配新鮮蔬果。"},
      {q:"蔬菜本身含哪些成分可阻斷亞硝酸鹽轉成有害物？", o:["胡蘿蔔素、維生素C與E","反式脂肪","亞硝酸鈉","氯化鈉"], a:0, e:"蔬菜含胡蘿蔔素、維生素C、E，可阻斷轉化並具抗氧化作用。"},
      {q:"蔬菜中的抗氧化成分可將亞硝酸鹽還原為何種無害物質？", o:["一氧化氮","二氧化碳","氨","甲烷"], a:0, e:"可將亞硝酸鹽還原為對人體無害的一氧化氮。"},
      {q:"一般所稱的『硝酸鹽』通常指哪種化合物？", o:["亞硝酸鈉NaNO₂","硝酸鈉NaNO₃","碳酸氫鈉","氯化鈉"], a:1, e:"硝酸鹽通常指硝酸鈉(NaNO₃)，亞硝酸鹽指亞硝酸鈉(NaNO₂)。"},
      {q:"關於剩菜加熱致癌的說法，下列何者正確？", o:["剩菜加熱與致癌有直接關聯","加熱隔夜蔬菜致癌純屬無稽之談","必定產生大量亞硝胺","會立刻造成癌變"], a:1, e:"林慶順教授指出加熱隔夜蔬菜會致癌純屬無稽之談；食品含量低於毒性劑量。"},
      {q:"硝酸鹽與亞硝酸鹽會在哪些環境條件下互相轉化？", o:["僅在冷凍時","細菌、氧氣、溫度、酸鹼條件","僅在真空時","完全不會轉化"], a:1, e:"兩者會在細菌、氧氣、溫度、酸鹼等不同環境中互相氧化或還原。"},
      {q:"加工肉品『亞硝胺』致癌疑慮被認為過度渲染，主因之一是？", o:["游離胺在肉品含量通常不高","蛋白質會直接變亞硝胺","亞硝酸鹽含量隨時間增加","肉品不含任何胺"], a:0, e:"亞硝胺由亞硝酸與游離胺結合而非與蛋白質；游離胺含量不高，亞硝酸鹽也隨時間降低。"},
      {q:"加工肉品真正較值得擔心的健康因素是？", o:["飽和脂肪、鹽分及卡洛里","維生素含量","水分含量","顏色深淺"], a:0, e:"比起亞硝胺，香腸的飽和脂肪、鹽分及卡洛里更值得關心。"},
      {q:"我國食品添加物標準中，硝酸鹽、亞硝酸鹽屬於第幾類？", o:["第三類防腐劑","第五類保色劑","第四類漂白劑","第一類抗氧化劑"], a:1, e:"列於『食品添加物使用範圍及限量暨規格標準』第五類『保色劑』。"},
      {q:"硝酸鹽/亞硝酸鹽以NO₂殘留量計的限量為？", o:["0.07 g/kg 或 0.005 g/kg 以下","10 g/kg","1 g/kg","完全不得添加"], a:0, e:"用量以NO₂殘留量計為0.07 g/kg或0.005 g/kg以下。"},
      {q:"FAO/WHO訂定亞硝酸鹽的每日容許量(ADI)約為？", o:["0.07 mg/kg體重","3.7 mg/kg體重","37 mg/kg體重","370 mg/kg體重"], a:0, e:"亞硝酸鹽ADI為0.07 mg/kg體重；硝酸鹽為3.7 mg/kg體重。"},
      {q:"60公斤成人每日可容許攝取的硝酸鹽約為？", o:["約222毫克","約4.2毫克","約2公克","約22公克"], a:0, e:"以3.7 mg/kg計，60公斤約222 mg硝酸鹽；亞硝酸鹽約4.2 mg。"},
      {q:"火腿類添加硝酸鹽，以二氧化氮殘留量計每公斤不得超過？", o:["0.07公克","7公克","0.7公克","70公克"], a:0, e:"限量以二氧化氮殘留量計，每公斤不得超過0.07公克。"},
      {q:"釀造醬油與火腿相比，下列何者硝酸鹽含量通常較高？", o:["蔬菜","火腿殘留量","加工肉","醬油"], a:0, e:"蔬菜的硝酸鹽含量也高於火腿中的硝酸鹽殘留量，故不必對火腿過度擔心。"},
      {q:"烹調加工肉品時，下列何種方式較能減少有害物生成？", o:["油炸","高溫燒烤","蒸、煮","炭烤"], a:2, e:"盡量減少油炸與高溫燒烤，改用蒸、煮方式。"},
      {q:"下列何者並非加工肉品添加硝酸鹽/亞硝酸鹽的目的？", o:["抑制細菌","保持肉的紅色","創造醃肉風味","增加重量"], a:3, e:"四大目的為抑菌、保色、醃漬風味與延緩脂肪酸敗。"},
      {q:"亞硝胺在動物實驗的致癌性，目前對人體的證據為何？", o:["已完全證實人體致癌","尚無亞硝胺在人體致癌的確切證據","證實可治癌","與人體無關"], a:1, e:"亞硝胺在動物實驗致癌，但目前還沒有在人體致癌的證據，醫學界仍建議少吃高溫燒烤加工肉。"},
      {q:"加工肉品中亞硝酸鹽含量隨時間會如何變化？", o:["逐漸增加","隨時間降低(轉化成硝酸鹽)","維持不變","變成蛋白質"], a:1, e:"加工肉品中亞硝酸鹽含量會隨時間降低並轉化成硝酸鹽。"},
      {q:"人的口水中含有下列何種物質？", o:["大量亞硝酸鹽","大量塑化劑","大量重金屬","完全不含氮化合物"], a:0, e:"口水裡本來就含有大量亞硝酸鹽，硝酸鹽是自然界普遍存在的物質。"},
      {q:"硝酸鹽在植物體中扮演的角色是？", o:["有害廢物","合成胺基酸、蛋白質所需的氮來源","農藥","色素"], a:1, e:"硝酸鹽是氮循環自然產物，供植物生長及合成胺基酸、蛋白質。"},
      {q:"歐盟對蔬果含硝酸鹽的評估結論是？", o:["蔬果攝入硝酸鹽的好處應高於風險","應全面禁食蔬果","蔬果硝酸鹽劇毒","與健康完全無關"], a:0, e:"歐盟認為進食蔬果帶來的好處應高於蔬果攝入硝酸鹽的風險，但仍應均衡飲食。"},
      {q:"FAO/WHO專家委員會對『訂定蔬菜硝酸鹽限量標準』的看法是？", o:["並無確切量化的科學證據","強制訂定","建議全面禁售","認為蔬菜應禁食"], a:0, e:"因缺乏蔬菜硝酸鹽產生亞硝基化合物的確切證據，認為訂定限量標準並無確切量化科學證據。"},
      {q:"去除蔬菜大部分硝酸鹽的處理方式為？", o:["清洗、去皮、烹煮","冷凍","曝曬","真空包裝"], a:0, e:"經清洗、去皮、烹煮後可去除大部分硝酸鹽。"},
      {q:"加工肉製品使用腸衣、真空包裝易形成何種環境？", o:["高氧環境","低氧或無氧環境","強酸環境","強鹼環境"], a:1, e:"腸衣、醃製及真空包裝易讓肉品處於低氧或無氧環境，促肉毒桿菌生長。"},
      {q:"肉毒桿菌產生的毒素具有何種作用？", o:["抑制神經傳導","促進消化","補充營養","殺死癌細胞"], a:0, e:"肉毒桿菌產生具抑制神經傳導作用的毒素。"},
      {q:"下列何種水果富含維生素C，建議搭配加工肉品食用？", o:["芭樂、奇異果","培根","香腸","起司"], a:0, e:"芭樂、奇異果、深綠色蔬菜富含維生素C，能抑制亞硝胺形成。"},
      {q:"購買加工肉品時應如何聰明挑選？", o:["選包裝標示清楚、殘留符合法規者","挑顏色最紅者","挑最便宜者","挑無標示者"], a:0, e:"建議選擇包裝標示清楚、殘留量符合法規的產品。"},
      {q:"亞硝基化合物在腸胃道較易生成的情況是？", o:["含亞硝酸鹽食物與含胺類食物一起吃","只吃蔬菜","空腹喝水","只吃水果"], a:0, e:"含亞硝酸鹽食物與含胺類食物一起吃，或經高溫油炸煎烤時易合成亞硝胺。"},
      {q:"關於『火腿吃了會致癌』的正確觀念是？", o:["一般吃早餐並不會超過每日容許量，不須過度緊張","必定致癌","應完全禁食","只要吃就會立即中毒"], a:0, e:"一般吃早餐並不會超過每日容許量，正常食用量下不用過度擔心。"},
      {q:"水解醬油與亞硝酸鹽無關，但與下列何種加工污染物相關？", o:["單氯丙二醇(3-MCPD)","亞硝胺","戴奧辛","三聚氰胺"], a:0, e:"水解(化學)醬油以鹽酸促進蛋白質分解，會產生3-MCPD(屬第6章內容)。"},
      {q:"硝酸鹽與亞硝酸鹽可添加於下列何種食品？", o:["加工肉製品及加工魚肉製品","新鮮蔬菜","生鮮水果","飲用水"], a:0, e:"兩者為合法添加物，可添加於加工肉製品及加工魚肉製品。"},
      {q:"正確使用硝酸鹽與亞硝酸鹽的最重要意義是？", o:["防範肉毒桿菌中毒","增加售價","延長運送距離","改變包裝"], a:0, e:"正確使用不僅提升品質安全，更是防範肉毒桿菌中毒的重要一環。"},
      {q:"早餐店常見的方形火腿多屬於哪一類？", o:["壓製火腿或重組火腿","天然整塊火腿","煙燻火腿原塊","發酵火腿"], a:0, e:"早餐店方形火腿多為壓製或重組火腿，以豬肉與禽肉混合壓製成形。"},
      {q:"亞硝酸鹽『所謂的毒性劑量』與肉品加工添加量的關係是？", o:["毒性劑量遠遠超過加工添加量","兩者相等","添加量遠超毒性劑量","無法比較"], a:0, e:"亞硝酸鹽的毒性指遠遠超過肉品加工所添加的劑量。"},
      {q:"硝酸鹽是否會致癌牽涉到下列何種因素？", o:["食用與轉化量多寡及與胺結合的時機","顏色深淺","包裝材質","品牌大小"], a:0, e:"是否致癌牽涉食用與轉化量、是否剛好與胃中胺物質結合等多階段演變，非直接推論。"},
      {q:"下列關於亞硝酸鹽的敘述何者錯誤？", o:["是合法肉品保色與防腐劑","在酸性或高溫易與胺類結合","大量攝入無任何危害","可抑制肉毒桿菌"], a:2, e:"大量攝入亞硝酸鹽會引發正鐵血紅蛋白血症，並非無害。"},
      {q:"CAS優良肉品規範對中式香腸等醃漬加工肉品的標準為？", o:["與法規相同的亞硝酸鹽限量標準","完全不限量","僅限外觀","僅限重量"], a:0, e:"CAS優良肉品規範針對中式香腸等也制訂相同之亞硝酸鹽限量標準。"},
      {q:"皮膚發紺(發青)是哪種狀況的典型症狀？", o:["正鐵血紅蛋白血症","維生素C過量","蛋白質不足","脂肪過多"], a:0, e:"正鐵血紅蛋白血症阻礙血液攜氧，導致呼吸困難與皮膚發紺。"},
      {q:"下列何者為降低亞硝胺攝取的正確早餐搭配？", o:["搭配含維生素C的水果與纖維","搭配油炸物","搭配醃漬高胺食物","搭配含糖飲料"], a:0, e:"食用時搭配含維生素C的水果與纖維，可抑制亞硝胺形成。"},
      {q:"關於硝酸鹽/亞硝酸鹽的總結觀念，下列何者最正確？", o:["合法且正確使用、選購標示清楚產品即可兼顧美味與安全","應完全避免所有含氮食物","蔬菜比加工肉更危險","完全不需任何規範"], a:0, e:"只要選購合法、標示清楚的產品，依規定使用，即可兼顧美味與健康。"}
    ]
  },
  ch6: {
    title: "第6章　食品加工衍生有害物",
    questions: [
      {q:"食品加工最基本的定義是？", o:["將生食經處理使其更適合食用、烹調及儲存","只指添加防腐劑","只指冷凍","使食物變質"], a:0, e:"食品加工是將生食經各種處理使其更適合食用、烹調及儲存。"},
      {q:"下列何者『不是』食品加工的優點？", o:["改善適口性與風味","增加保存性","提升安全性","必然增加致癌物且無益處"], a:3, e:"加工有改善風味、保存、營養、安全等優點；衍生有害物可透過製程控制降低。"},
      {q:"多環芳香烴(PAHs)主要由何種過程產生？", o:["有機物不完全燃燒","低溫冷凍","發酵","水解"], a:0, e:"PAHs由煤炭、燃油、菸草或肉類等有機物不完全燃燒形成。"},
      {q:"食品中PAHs最常見的來源是？", o:["高溫燒烤、油炸、煙燻、烘乾","清蒸","水煮","生食"], a:0, e:"食品PAHs主要源於高溫燒烤、油炸、煙燻或烘乾，尤其脂肪滴落炭火產生的煙霧附著。"},
      {q:"PAHs中最具代表性的一級致癌物是？", o:["苯並芘(BaP)","維生素C","葡萄糖","氯化鈉"], a:0, e:"苯並芘(benzo(a)pyrene, BaP)被國際癌症研究中心歸類為一級致癌物。"},
      {q:"PAHs的致癌機制是經代謝酶轉化後攻擊細胞內何種分子？", o:["DNA(形成DNA加合物)","水分子","醣類","礦物質"], a:0, e:"PAHs經代謝酶轉成親電子代謝物，與DNA形成加合物，引發基因突變與癌變。"},
      {q:"參與PAHs(苯並芘)氧化活化的主要代謝酶是？", o:["細胞色素P450(CYP1A1、CYP1B1)","澱粉酶","脂肪酶","胰蛋白酶"], a:0, e:"PAHs進入體內後由CYP1A1、CYP1B1等P450酶氧化成二醇環氧代謝物。"},
      {q:"OSHA規定空氣中PAHs含量不得超過？", o:["0.2 mg/m³","2 mg/m³","20 mg/m³","完全禁止"], a:0, e:"OSHA規定空氣中PAHs不得超過0.2 mg/m³；NIOSH建議不超過0.1 mg/m³。"},
      {q:"下列何者是降低食物PAHs的正確做法？", o:["烤肉時用錫箔紙包裹減少脂肪滴落火中","延長炭烤時間","多吃燒焦部位","提高燒烤溫度"], a:0, e:"用錫箔紙包裹減少脂肪滴落、切除焦黑、改用蒸煮燉微波、多吃蔬菜。"},
      {q:"高濃度PAHs暴露可能增加下列哪些癌症風險？", o:["食道癌、胃癌與直腸癌","白血病","皮膚過敏","近視"], a:0, e:"暴露於高濃度PAHs可能導致食道癌、胃癌與直腸癌等風險。"},
      {q:"丙烯醯胺主要透過何種化學反應生成？", o:["梅納反應","皂化反應","水解反應","中和反應"], a:0, e:"丙烯醯胺主要透過梅納反應(糖類與胺基酸反應)生成。"},
      {q:"丙烯醯胺在多少溫度以上較易生成？", o:["120℃","40℃","60℃","80℃"], a:0, e:"食材於120℃以上烹調時，胺基酸與還原糖反應形成丙烯醯胺。"},
      {q:"丙烯醯胺最易在哪類食品中生成？", o:["澱粉類食品","新鮮蔬菜","礦泉水","生魚片"], a:0, e:"梅納反應形成丙烯醯胺，最易發生於澱粉類食品(如洋芋片、薯條、麵包)。"},
      {q:"丙烯醯胺生成所需的胺基酸主要是？", o:["天門冬醯胺","白胺酸","甲硫胺酸","半胱胺酸"], a:0, e:"食物中的胺基酸(尤其天門冬醯胺)與還原糖反應生成丙烯醯胺。"},
      {q:"IARC將丙烯醯胺列為第幾級致癌物？", o:["2A","1","3","4"], a:0, e:"IARC自1994年將丙烯醯胺列為2A(對動物有致癌證據，人類證據不足)。"},
      {q:"丙烯醯胺進入體內後代謝為何種具活性物質？", o:["環氧丙醯胺(Glycidamide)","葡萄糖","乳酸","尿素"], a:0, e:"經肝臟CYP2E1代謝成高活性的環氧丙醯胺，與DNA鳥嘌呤形成加合物。"},
      {q:"下列何者是減少丙烯醯胺生成的正確做法？", o:["炸烤呈金黃色即可，不要棕焦","炸到深棕色","沾糖漿再炸","用銨粉膨鬆劑"], a:0, e:"炸烤呈金黃(golden)不可棕焦；避免沾糖、改用小蘇打不用銨粉。"},
      {q:"為減少丙烯醯胺，馬鈴薯不宜儲藏於何種溫度？", o:["8℃以下(如冰箱)","30℃","略高於8℃陰涼處","常溫"], a:0, e:"馬鈴薯避免儲藏於8℃以下以免還原糖增加；宜略高於8℃的陰涼處。"},
      {q:"食藥署發布的『食品中丙烯醯胺指標值』性質為？", o:["非衛生標準值，僅供參考","強制衛生標準","罰則依據","禁止販售依據"], a:0, e:"食藥署重申指標值非衛生標準值，國際亦未訂限量標準，僅供業者減量參考。"},
      {q:"想避免攝取丙烯醯胺，較佳的烹調方式是？", o:["蒸煮","油炸","燒烤","烘烤"], a:0, e:"蒸煮較少達到120℃以上條件，是避免丙烯醯胺的方法之一。"},
      {q:"反式脂肪酸對健康危害最大的來源是？", o:["人工部分氫化植物油","反芻動物天然脂肪","橄欖油原油","深海魚油"], a:0, e:"人工反式脂肪由植物油『部分氫化』產生，對健康危害最大。"},
      {q:"反式脂肪對血脂的影響是？", o:["升高壞膽固醇LDL、降低好膽固醇HDL","升高HDL、降低LDL","兩者都降低","兩者都不變"], a:0, e:"反式脂肪使LDL上升、HDL下降，對心血管危害是飽和脂肪的3~5倍。"},
      {q:"天然反式脂肪存在於下列何者？", o:["牛、羊等反芻動物的肉品與乳製品","植物油","海帶","糙米"], a:0, e:"少量天然反式脂肪存在於反芻動物肉品乳製品(如共軛亞麻油酸)，通常無害。"},
      {q:"WHO建議每日反式脂肪攝取量不應超過總熱量的？", o:["1%","10%","30%","50%"], a:0, e:"建議每天反式脂肪攝取不得超過總熱量的1%(60公斤1800大卡者約2克)。"},
      {q:"台灣規定包裝食品每100g反式脂肪含量在多少以下可標示為『0』？", o:["0.3公克","3公克","30公克","0公克"], a:0, e:"每100公克或100ml食品中反式脂肪含量在0.3公克以下，可標示為零。"},
      {q:"衛福部對食品中人工反式脂肪的規定是？", o:["不得使用不完全(部分)氫化油","可無限制使用","僅限餐廳使用","須額外加量"], a:0, e:"衛福部規定食品中已不得使用不完全(部分)氫化油。"},
      {q:"辨識反式脂肪時，成分表應留意下列哪些關鍵字？", o:["氫化植物油、人造奶油、奶精","橄欖油","海鹽","蔗糖"], a:0, e:"看到『氫化』『硬化』『人造奶油』『奶精』『轉化脂肪』即含反式脂肪。"},
      {q:"下列何種食物較可能含有反式脂肪？", o:["甜甜圈、酥皮點心、奶精","清燙青菜","白開水","水煮蛋"], a:0, e:"油炸物、西餅蛋糕、酥皮類、奶精、人造奶油等較可能含反式脂肪。"},
      {q:"單氯丙二醇(3-MCPD)主要在製造何種產品時產生？", o:["水解(化學)醬油","釀造醬油","食醋","米酒"], a:0, e:"3-MCPD是水解醬油以鹽酸促進脫脂黃豆蛋白質分解時產生。"},
      {q:"釀造醬油為何不會產生3-MCPD？", o:["利用微生物自然發酵，未加鹽酸","加更多鹽酸","高溫油炸","添加亞硝酸鹽"], a:0, e:"釀造醬油以麴菌等微生物發酵分解蛋白質，製程沒有加鹽酸的步驟，故不產生3-MCPD。"},
      {q:"3-MCPD生成的關鍵原料殘留物是？", o:["脫脂黃豆殘存的油脂(三酸甘油酯)","蛋白質","纖維","糖"], a:0, e:"殘存三酸甘油酯的甘油氫氧基被鹽酸的氯取代而形成3-MCPD。"},
      {q:"JECFA(2001)對3-MCPD基因毒性的認定是？", o:["在實驗動物體內不具基因毒性","具強基因毒性","為一級致癌物","完全無害無需管制"], a:0, e:"JECFA認定3-MCPD不具基因毒性、無致癌結論，屬非基因毒性致癌物，但仍訂管制限量。"},
      {q:"我國現行『食品中污染物質及毒素衛生標準』對醬油類3-MCPD限量為？", o:["0.3 ppm","1 ppm","0.4 ppm","3 ppm"], a:0, e:"我國現行限量為0.3 ppm(較原本1 ppm更嚴格)。"},
      {q:"如何降低水解醬油中3-MCPD的含量？", o:["管制原料油脂含量(用低脂蛋白粉)","增加鹽酸濃度","提高反應溫度","延長反應時間"], a:0, e:"降低油脂含量(如用釀造專用低脂蛋白粉)、降低酸濃度、反應時間與加工溫度。"},
      {q:"異環胺類化合物(HCAs)主要在何種食物中生成？", o:["高蛋白食物(肉、魚)高溫烹調","蔬菜","水果","白飯"], a:0, e:"富含胺基酸與肌酸的高蛋白食物在高溫(>150℃)烹煮時產生HCAs。"},
      {q:"HCAs生成與下列哪種成分密切相關？", o:["肌酸(creatine)與胺基酸","膳食纖維","水分","維生素C"], a:0, e:"高蛋白食物富含胺基酸和肌酸，高溫時蛋白質分解變性產生異環胺。"},
      {q:"關於HCAs生成，下列何者會使其增加？", o:["溫度越高、時間越長、火焰直接燒炙","低溫短時間","水煮","清蒸"], a:0, e:"溫度越高、加溫時間越長、在火焰下直接燒炙，會生成更多異環胺。"},
      {q:"大量攝取燒烤、油炸肉類，會提高罹患何種癌症風險？", o:["大腸癌","白血病","皮膚癌","甲狀腺癌"], a:0, e:"調查顯示攝取大量燒烤、油炸肉類會提高罹患大腸癌的風險。"},
      {q:"要減少異環胺生成，下列何者正確？", o:["先以微波爐料理肉類縮短高溫時間","延長炭烤","直接火焰燒炙","烤到焦黑"], a:0, e:"避免肉類直接暴露火焰、先微波縮短高溫時間、防止局部過熱避免烤焦。"},
      {q:"HCAs與PAHs這兩類物質被體內酵素代謝活化後可能？", o:["破壞DNA而致癌","補充營養","增強免疫","促進消化"], a:0, e:"兩類物質經特殊酵素代謝活化後可能破壞DNA而致癌。"},
      {q:"鹼處理(pH>10)加熱會造成胺基酸何種變化？", o:["消旋化、結構破壞，降低營養並產生毒害物質","增加營養","完全無變化","變成維生素"], a:0, e:"鹼處理pH>10加熱使胺基酸消旋化、破壞損傷，降低營養並產生毒害物質。"},
      {q:"下列何者為鹼處理產生的衍生胺基酸有害物？", o:["離胺丙胺酸(Lysinoalanine)、羊毛胺酸(Lanthionine)","維生素D","葡萄糖","乳酸"], a:0, e:"鹼+熱處理產生離胺丙胺酸與羊毛胺酸等毒害物質。"},
      {q:"脂質過氧化是食品產生何種劣化的主因？", o:["酸敗(油耗味)","發酵","結晶","褐變"], a:0, e:"脂質過氧化會破壞細胞膜並導致食品酸敗(油耗味)。"},
      {q:"脂質過氧化的三個階段順序是？", o:["引發→傳遞→終止","終止→傳遞→引發","傳遞→引發→終止","引發→終止→傳遞"], a:0, e:"機轉分為引發(Initiation)、傳遞(Propagation)、終止(Termination)三階段。"},
      {q:"脂質過氧化『傳遞階段』中，脂質自由基會與何者迅速結合？", o:["氧氣(O₂)","氮氣","二氧化碳","水"], a:0, e:"傳遞階段不飽和脂質自由基與O₂結合形成脂質過氧自由基(LOO·)。"},
      {q:"脂質過氧化的初級產物，可用來判斷油脂新鮮度的指標是？", o:["過氧化價(POV)","酸價以外都不行","水分含量","顏色"], a:0, e:"初級產物脂質氫過氧化物(LOOH)可用過氧化價POV判斷新鮮度，單位meq/kg。"},
      {q:"脂質過氧化的代表性次級產物是？", o:["丙二醛(MDA)","葡萄糖","乳酸","尿酸"], a:0, e:"氫過氧化物進一步分解成醛酮酸類，代表物為丙二醛(MDA)。"},
      {q:"脂質過氧化『終止階段』如何發生？", o:["自由基互相結合成穩定非自由基產物","持續連鎖無法停止","加更多氧","加熱"], a:0, e:"當兩個自由基碰撞結合成穩定的非自由基產物時，連鎖反應停止。"},
      {q:"縮水甘油酯(Glycidyl Esters)主要在何種製程中生成？", o:["油脂高溫精製脫臭過程","低溫發酵","冷壓","水洗"], a:0, e:"縮水甘油酯為油脂精製(高溫脫臭)過程中可能生成的加工污染物。"},
      {q:"食藥署針對高溫加工兩大污染物的烹調建議是？", o:["油炸160~175℃、烘烤180~220℃、呈金黃即可","越高溫越好","烤到焦黑","完全生食"], a:0, e:"油炸160~175℃、烘烤180~220℃、呈金黃色即可，並去皮刮除煙燻燒焦處。"}
    ]
  },
  ch7: {
    title: "第7章　食品中環境汙染物",
    questions: [
      {q:"環境荷爾蒙的另一個名稱是？", o:["內分泌干擾物質","抗氧化劑","防腐劑","益生菌"], a:0, e:"環境荷爾蒙指可能影響內分泌系統的化學物質，又稱內分泌干擾物質。"},
      {q:"下列何者被稱為『世紀之毒』？", o:["戴奧辛","維生素C","氯化鈉","葡萄糖"], a:0, e:"戴奧辛因難以分解而得到『世紀之毒』之稱。"},
      {q:"下列哪些重金屬屬於常見的環境荷爾蒙？", o:["鎘、汞、鉛","鈣、鎂、鉀","鐵、鋅、銅","鈉、氯、碘"], a:0, e:"常見環境荷爾蒙重金屬包括鎘、汞、鉛。"},
      {q:"塑膠製品中常見的環境荷爾蒙是？", o:["雙酚A、鄰苯二甲酸酯類(塑化劑)","維生素E","乳酸菌","纖維素"], a:0, e:"塑膠製品中的雙酚A、鄰苯二甲酸酯類(塑化劑)屬環境荷爾蒙。"},
      {q:"哈佛大學研究發現，吃罐頭蔬菜湯組體內雙酚A濃度約為吃新鮮湯組的？", o:["10倍","2倍","相同","一半"], a:0, e:"罐頭湯組體內雙酚A濃度是吃新鮮蔬菜湯的10倍之多。"},
      {q:"環境荷爾蒙對男性的特定影響是？", o:["精蟲數下降、與前列腺癌睪丸癌有關","促進肌肉生長","增強視力","提高骨密度"], a:0, e:"對男性與前列腺癌、睪丸癌有關，並使精蟲數下降、睪丸縮小。"},
      {q:"環境荷爾蒙對女性的特定影響是？", o:["與乳癌、子宮內膜癌及卵巢癌有關","增高","延緩老化","強化免疫"], a:0, e:"對女性與乳癌、子宮內膜癌及卵巢癌有關，子宮內膜異常增生、受孕力下降。"},
      {q:"1979年發生在彰化、造成2千多人受害的環境荷爾蒙事件是？", o:["多氯聯苯中毒事件","塑化劑事件","毒奶粉事件","三聚氰胺事件"], a:0, e:"1979年彰化多氯聯苯中毒事件，受害者出現氯痤瘡等皮膚病變。"},
      {q:"2011年台灣爆發的環境荷爾蒙食安事件是？", o:["塑化劑(起雲劑)事件","多氯聯苯事件","戴奧辛事件","鉛中毒事件"], a:0, e:"2011年不肖廠商在起雲劑摻加工業用塑化劑DEHP，引發塑化劑事件。"},
      {q:"多氯聯苯(PCBs)的物理特性是？", o:["不易燃燒、良好絕緣體","極易燃","強酸性","具放射性"], a:0, e:"PCBs不易燃燒且是良好絕緣體，常用於變壓器、電容器、塗料溶劑。"},
      {q:"多氯聯苯被IARC歸類為？", o:["Group 2A(極有可能為致癌因子)","完全無害","必需營養素","Group 4"], a:0, e:"IARC已將多氯聯苯歸類為Group 2A極有可能為致癌因子。"},
      {q:"多氯聯苯具高脂溶性，在食物鏈中的特性是？", o:["生物鏈層次越高、體內濃度越高","越低層越高","不會累積","只存於植物"], a:0, e:"PCBs脂溶性高，隨食物鏈層次越高，生物體內濃度也越高(生物放大)。"},
      {q:"預防從食物攝取多氯聯苯的建議是？", o:["減少動物性脂肪攝取、均衡飲食","多吃肥肉","只吃動物內臟","增加油脂攝取"], a:0, e:"PCBs累積於脂肪，建議減少動物性脂肪攝取、食用低脂食物並均衡飲食。"},
      {q:"戴奧辛是如何產生的？", o:["含氯物質燃燒(如PVC焚化)時產生的有毒副產物","植物自然合成","發酵生成","人體製造"], a:0, e:"戴奧辛無商業用途，為含氯物質燃燒或製造時產生的有毒產物。"},
      {q:"人類約有多少比例的戴奧辛暴露來自日常飲食？", o:["90%","10%","30%","50%"], a:0, e:"人類有90%的戴奧辛暴露來自日常飲食、乳製品、蛋還有魚。"},
      {q:"IARC(1997)將2,3,7,8-TCDD戴奧辛分類為？", o:["Group 1(人類已知致癌物)","Group 2B","Group 3","無致癌性"], a:0, e:"依人類流行病學研究，戴奧辛被分類為Group 1人類已知致癌物。"},
      {q:"短時間高濃度戴奧辛暴露會造成？", o:["肝功能及皮膚傷害(如氯痤瘡)","骨折","近視","掉髮且無其他影響"], a:0, e:"短時間高濃度暴露造成肝功能及皮膚傷害，如氯痤瘡、深色皺紋。"},
      {q:"雙酚A(BPA)的結構類似何種物質，故被視為環境荷爾蒙？", o:["雌性激素","胰島素","甲狀腺素","腎上腺素"], a:0, e:"雙酚A結構類似雌性激素，被視為荷爾蒙干擾物。"},
      {q:"雙酚A在食品容器中的主要用途是？", o:["聚碳酸酯(PC)塑膠原料、罐頭內壁塗層","防腐劑","色素","甜味劑"], a:0, e:"雙酚A常作為PC塑膠原料，也作罐頭內壁塗層原料之一。"},
      {q:"含雙酚A的塑膠容器在何種情況較易釋出BPA？", o:["刮痕磨損後經高溫、酸鹼、微波","低溫存放","乾燥保存","完整未刮傷時"], a:0, e:"容器刮痕磨損後經高溫加熱、酸鹼、酒精、微波或強清潔劑作用即可能釋出。"},
      {q:"我國對雙酚A的管理措施是？", o:["全面禁止製造及販售含雙酚A之嬰幼兒奶瓶","完全不管制","僅限餐廳","僅限出口"], a:0, e:"為保障嬰幼兒安全，我國全面禁止製造及販售含雙酚A之嬰幼兒奶瓶。"},
      {q:"降低雙酚A攝取的建議是？", o:["盡量食用新鮮食品、避免塑膠容器加熱","多吃罐頭","塑膠容器曝曬","用刮傷容器盛熱食"], a:0, e:"飲食是主要來源，建議多吃新鮮食品、避免塑膠容器加熱或曝曬，刮傷變形即更換。"},
      {q:"壬基苯酚(NP)為何被認定為環境荷爾蒙？", o:["化學結構與雌性激素相似","具放射性","為強酸","含重金屬"], a:0, e:"壬基苯酚化學結構與雌激素相似，被認定是環境荷爾蒙之一。"},
      {q:"壬基苯酚主要用於生產NPEO，作為何種成分？", o:["工業清潔劑的非離子型界面活性劑","食品防腐劑","食用色素","維生素"], a:0, e:"NPEO主要作為工業清潔劑中的非離子型界面活性劑。"},
      {q:"我國規定食品用洗潔劑中壬基苯酚類界面活性劑含量須小於？", o:["0.1%(重量比)","10%","1%","5%"], a:0, e:"食品用洗潔劑中壬基苯酚類界面活性劑含量需小於0.1%(重量比)。"},
      {q:"壬基苯酚與壬基苯酚聚乙氧基醇被環保署列為？", o:["第一類毒性化學物質","食品添加物","營養補充劑","一般清潔劑"], a:0, e:"環保署依毒管法公告列管，列為第一類毒性化學物質。"},
      {q:"鎘長時間低劑量暴露主要會累積並損害哪個器官？", o:["腎臟","心臟","眼睛","皮膚"], a:0, e:"長時間暴露低劑量鎘會累積於腎臟並可能導致腎臟疾病，其他影響為肺損傷與骨骼脆弱。"},
      {q:"對吸菸者而言，攝取鎘的主要來源是？", o:["香煙的菸霧","飲用水","蔬菜","空氣中自然濃度"], a:0, e:"對吸煙者，香煙的菸霧是攝取鎘的主要來源。"},
      {q:"汞在水生系統中會被微生物轉化為何種毒性更強的形態？", o:["甲基汞","金屬汞","氧化汞","硫化汞"], a:0, e:"微生物可把無機汞轉化為甲基汞，主要以甲基汞積存於魚類體內。"},
      {q:"關於魚體內甲基汞的累積，下列何者正確？", o:["體型較大的魚積存較多","體型小的魚最多","與大小無關","植物性食物最多"], a:0, e:"體型較大、食物鏈位置越高的魚，積存的甲基汞越多。"},
      {q:"甲基汞對人體最敏感的危害對象是？", o:["胎兒(影響腦與神經發育)","成年男性","老年人骨骼","皮膚"], a:0, e:"胎兒發育最易受汞影響，甲基汞損害神經發育，影響認知、記憶、語言等。"},
      {q:"預防汞污染食物的建議是？", o:["孕婦幼童避免選吃高汞魚、均衡攝取多種魚","只吃大型魚","只吃單一種魚","完全不吃魚"], a:0, e:"保持均衡飲食、適量進食多種魚類；孕婦、計畫懷孕婦女與幼童應避免高汞魚。"},
      {q:"鉛對兒童的主要危害是？", o:["認知與智力發展遲緩、中樞神經受損","增高","視力變好","骨骼強化"], a:0, e:"長期攝取小量鉛可令兒童認知和智力發展遲緩，嬰幼兒中樞神經較易受損。"},
      {q:"食品中出現鉛的可能原因之一是？", o:["鉛焊罐頭裝酸性食物、劣質彩釉陶瓷釋出","新鮮蔬菜本身大量含鉛","水煮去除","冷凍產生"], a:0, e:"鉛焊罐頭裝酸性食物、品質不良的彩釉陶瓷可能釋出鉛污染食物。"},
      {q:"減少蔬菜表面含鉛塵垢的有效做法是？", o:["烹煮前徹底浸洗(尤其葉菜)","直接生食","只用乾布擦","曝曬"], a:0, e:"烹煮前徹底浸洗蔬菜，尤其葉菜，能大幅減少表面含鉛的塵垢和泥土。"},
      {q:"全氟烷基化合物(PFASs)的特性是？", o:["疏水疏油、表面活性、化學穩定","易分解","水溶性高易排出","具強酸性"], a:0, e:"PFASs具疏水性、疏油性、表面活性及化學穩定性，廣泛用於防污防油防水塗層。"},
      {q:"人體暴露PFASs的主要來源是？", o:["食物攝入","皮膚接觸為主","注射","完全無暴露"], a:0, e:"人體暴露PFASs主要為食物攝入，少部分來自灰塵吸入及皮膚接觸。"},
      {q:"減少攝入PFASs的建議是？", o:["減少使用防油包材直接加熱盛裝熱食、分散食物來源","多用防油紙包熱食","只吃單一食物","大量食用魚水產"], a:0, e:"應落實均衡飲食、分散來源，並減少防油包材直接加熱或盛裝熱食。"},
      {q:"不沾鍋(鐵氟龍)安全使用的重點是？", o:["避免高溫空燒(>360℃)","越高溫越好","用金屬鏟刮","空燒越久越好"], a:0, e:"安全重點是避免高溫空燒、避免刮傷、損傷即汰換。"},
      {q:"過去鐵氟龍被認為具致癌風險，是因製造時使用何種表面活化劑？", o:["全氟辛酸PFOA(2B致癌物)","維生素C","檸檬酸","小蘇打"], a:0, e:"早期使用的PFOA被列為2B級致癌物，業者已於2015年起停用。"},
      {q:"三聚氰胺常被用於製造何種餐具？", o:["美耐皿餐具","玻璃杯","不鏽鋼鍋","陶瓷碗"], a:0, e:"三聚氰胺-甲醛樹酯製成美耐皿餐具，耐熱耐水硬度高。"},
      {q:"美耐皿餐具在何種情況較易溶出三聚氰胺單體？", o:["聚合不完全又盛裝高溫或酸性食品","盛裝冷水","乾燥存放","盛裝常溫食物"], a:0, e:"製造時分子聚合不完全，又盛裝高溫或酸性食品時，有溶出三聚氰胺單體的風險。"},
      {q:"『劣質』美耐皿餐具通常使用何種低廉原料？", o:["尿素","蔗糖","食鹽","澱粉"], a:0, e:"劣質美耐皿以成本較低的『尿素』與甲醛樹酯相融，溶出情況更嚴重。"},
      {q:"2008年毒奶粉事件中，業者添加三聚氰胺是為了？", o:["假造高含氮量冒充蛋白質","增加甜味","保色","防腐"], a:0, e:"中國乳業以測『含氮量』代『蛋白質』，加尿素或氨肥以加速通過測量。"},
      {q:"長期攝取三聚氰胺(混三聚氰酸)主要造成何種泌尿系統危害？", o:["腎結石、腎衰竭","近視","掉髮","骨折"], a:0, e:"三聚氰胺與三聚氰酸在腎臟沉積結晶形成腎結石，堵塞腎小管最終腎衰竭。"},
      {q:"我國對美耐皿餐具三聚氰胺溶出限量標準為？", o:["2.5 ppm以下","25 ppm","0.3 ppm","完全不限"], a:0, e:"我國限定三聚氰胺溶出限量標準為2.5 ppm以下，與國際一致。"},
      {q:"我國對乳製品中三聚氰胺的規定是？", o:["不允許驗出任何三聚氰胺","可驗出2.5 ppm","可驗出10 ppm","無規定"], a:0, e:"2008年定2.5 ppm為食品殘留判定標準，並不允許乳製品類中驗出任何三聚氰胺。"},

<script>
const CH_ORDER = ["ch5","ch6","ch7","ch11"];
const best = {}; // 本次工作階段最佳分數
let state = null;

const $ = id => document.getElementById(id);
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

function renderMenu(){
  $("menu").classList.remove("hidden");
  $("quiz").classList.add("hidden");
  $("result").classList.add("hidden");
  const grid = $("chapGrid"); grid.innerHTML="";
  CH_ORDER.forEach(k=>{
    const c = QUIZ[k];
    const el = document.createElement("div");
    el.className="chap";
    el.innerHTML = `<h3>${c.title}</h3>
      <div class="meta">${c.questions.length} 題單選</div>
      <div class="best">${best[k]!=null?("最佳："+best[k]+" / "+c.questions.length):""}</div>
      <div class="modes">
        <button class="btn btn-primary" data-k="${k}" data-mode="seq">循序測驗</button>
        <button class="btn btn-ghost" data-k="${k}" data-mode="rand">隨機抽考</button>
      </div>`;
    grid.appendChild(el);
  });
  grid.querySelectorAll("button").forEach(b=>{
    b.onclick = ()=> startQuiz(b.dataset.k, b.dataset.mode);
  });
}

function startQuiz(k, mode, subset){
  const src = subset || QUIZ[k].questions.map((q,i)=>({...q,_i:i}));
  let list = src.map(q=>({...q}));
  if(mode==="rand") list = shuffle(list);
  state = { k, mode, list, pos:0, answers:new Array(list.length).fill(null), ok:0, no:0 };
  $("menu").classList.add("hidden");
  $("result").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  $("qTitle").textContent = QUIZ[k].title;
  renderQ();
}

function renderQ(){
  const {list,pos,answers} = state;
  const q = list[pos];
  $("prog").style.width = ((pos)/list.length*100)+"%";
  $("posTxt").textContent = `第 ${pos+1} / ${list.length} 題`;
  $("okTxt").textContent = state.ok;
  $("noTxt").textContent = state.no;
  const ans = answers[pos];
  let html = `<div class="qnum">Q${pos+1}</div><p class="qtext">${q.q}</p>`;
  const keys=["A","B","C","D"];
  q.o.forEach((opt,i)=>{
    let cls="opt";
    if(ans!=null){
      cls+=" disabled";
      if(i===q.a) cls+=" correct";
      else if(i===ans.choice) cls+=" wrong";
    }
    html += `<div class="${cls}" data-i="${i}"><div class="key">${keys[i]}</div><div class="txt">${opt}</div></div>`;
  });
  html += `<div class="explain ${ans!=null?"show":""}" id="exp"><b>詳解：</b>${q.e}</div>`;
  $("qbody").innerHTML = html;
  if(ans==null){
    $("qbody").querySelectorAll(".opt").forEach(o=>{
      o.onclick = ()=> choose(parseInt(o.dataset.i));
    });
  }
  $("prevBtn").disabled = pos===0;
  $("nextBtn").textContent = pos===list.length-1 ? "看成績 →" : "下一題 →";
}

function choose(i){
  const {list,pos,answers}=state;
  if(answers[pos]!=null) return;
  const q=list[pos];
  const correct = i===q.a;
  answers[pos]={choice:i,correct};
  if(correct) state.ok++; else state.no++;
  renderQ();
}

function next(){
  if(state.pos < state.list.length-1){ state.pos++; renderQ(); }
  else finish();
}
function prev(){ if(state.pos>0){ state.pos--; renderQ(); } }

function finish(){
  const {list,answers,k}=state;
  const score = answers.filter(a=>a&&a.correct).length;
  // 只在完整作答整章時更新最佳
  if(state.mode!=="subset" && list.length===QUIZ[k].questions.length){
    if(best[k]==null || score>best[k]) best[k]=score;
  }
  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");
  const total=list.length, pct=Math.round(score/total*100);
  $("scoreBig").textContent = score+" / "+total;
  let msg = pct>=90?"優異！觀念非常扎實 🎉":pct>=70?"不錯，再複習錯題就更穩了":pct>=50?"及格邊緣，建議重做錯題":"再加油，先看詳解複習一輪";
  $("scoreSub").textContent = `答對率 ${pct}%　·　${msg}`;
  drawRing(pct);
  // review
  const keys=["A","B","C","D"];
  let r = `<h4>逐題檢討（共 ${total} 題）</h4>`;
  list.forEach((q,idx)=>{
    const a=answers[idx];
    const got = a? (a.correct?'<span class="tag ok">答對</span>':'<span class="tag no">答錯</span>') : '<span class="tag no">未作答</span>';
    r += `<div class="ritem"><div class="q">${got}Q${idx+1}. ${q.q}</div>`;
    r += `<div class="a">正解：${keys[q.a]}. ${q.o[q.a]}</div>`;
    if(a && !a.correct) r += `<div class="y">你的選擇：${keys[a.choice]}. ${q.o[a.choice]}</div>`;
    r += `<div class="e">詳解：${q.e}</div></div>`;
  });
  $("review").innerHTML=r;
  if($("result").scrollIntoView) $("result").scrollIntoView({behavior:"smooth"});
  else window.scrollTo(0,0);
}

function drawRing(pct){
  const c=Math.PI*2*52, off=c*(1-pct/100);
  const col = pct>=70?"#1f9d55":pct>=50?"#e0a800":"#d64545";
  $("ring").innerHTML = `
    <circle cx="60" cy="60" r="52" fill="none" stroke="#e9eef5" stroke-width="12"/>
    <circle cx="60" cy="60" r="52" fill="none" stroke="${col}" stroke-width="12"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 60 60)"/>
    <text x="60" y="68" text-anchor="middle" font-size="26" font-weight="800" fill="${col}">${pct}%</text>`;
}

// result buttons
$("retryAll").onclick = ()=> startQuiz(state.k, state.mode);
$("retryWrong").onclick = ()=>{
  const wrong = state.list.filter((q,idx)=>{const a=state.answers[idx];return !a||!a.correct;});
  if(wrong.length===0){ alert("這次全對，沒有錯題可重做！"); return; }
  startQuiz(state.k, "subset", wrong.map(q=>({...q})));
  state.mode="subset";
};
$("toMenu").onclick = renderMenu;
$("backBtn").onclick = ()=>{ if(confirm("離開目前測驗並返回章節選單？")) renderMenu(); };
$("nextBtn").onclick = next;
$("prevBtn").onclick = prev;

renderMenu();
</script>
</body>
</html>
